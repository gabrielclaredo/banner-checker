name: Banner Checker — Bemol

on:
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * 1-5'   # 8h00 (Manaus, UTC-4), seg-sex
    - cron: '30 20 * * 1-5'  # 16h30 (Manaus, UTC-4), seg-sex

jobs:
  check-banners:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          pip install playwright sendgrid
          playwright install chromium
          playwright install-deps chromium

      - name: Rodar verificação
        env:
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
        run: python checker.py

      - name: Salvar relatório como artefato
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: report-banners-${{ github.run_number }}
          path: report_banners.html
          retention-days: 30

      - name: Manter workflow ativo
        run: echo "Workflow executado em $(date)"
